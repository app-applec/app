<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applec - Aprèn Català</title>
    
    <link rel="stylesheet" href="css/style_pantalla_carga.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Estilos críticos para ocultar el contenido mientras carga */
        body { margin: 0; overflow: hidden; }
        #app-container { display: none; }
    </style>
</head>
<body>

    <div id="pantalla_carga_wrapper">
        <div class="contenidor_del_contenidor">
            <div class="contenidor_icona">
                <div class="icona"></div>
            </div>
        </div>
    </div>

    <main id="app-container">
        <section id="step-1" class="screen active">
            <div class="logo"></div>
            <h1 class="main-title">Applec</h1>
            <h2 class="subtitle">Aprèn Català d’una forma activa!</h2>
            <div class="button-group">
                <button class="btn btn-primary" onclick="nextStep(2)">Iniciar Sessió</button>
                <button class="btn btn-primary" onclick="nextStep(3)">Registrar-se</button>
            </div>
        </section>

        <section id="step-2" class="screen">
            <div class="logo-small"></div>
            <h2 class="form-title-serif">INICI DE<br>SESSIÓ</h2>
            <form class="custom-form">
                <div class="input-group"><label>Nom d’usuari</label><input type="text"></div>
                <div class="input-group"><label>Contrasenya</label><input type="password"></div>
                <p class="forgot-password">Has oblidat la teva contrasenya?</p>
                <button type="button" class="btn btn-primary btn-full" onclick="window.location.href='html/pg1home.html'">Continuar</button>
            </form>
        </section>

        <section id="step-8" class="screen">
            <div class="logo-small logo-faded"></div>
            <div class="speech-container">
                <div class="speech-bubble">
                    <p>Som-hi doncs ja estem llestos!<br><strong>Anem a la app.</strong></p>
                    <button class="btn-next-arrow" onclick="window.location.href='html/pg1home.html'">
                        <img src="img/flecha-seguir.png" alt="Entrar">
                    </button>
                </div>
            </div>
            <div class="character-container">
                <img src="img/panot-sessio.png" alt="Pannot" class="character-img">
            </div>
        </section>
    </main>

    <script src="js/registro.js"></script>
    <script src="js/loader.js"></script>
</body>
</html>
